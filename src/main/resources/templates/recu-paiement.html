<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Reçu de paiement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            margin: 30px;
            color: #222;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            margin-bottom: 12px;
        }

        .label {
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }

        table, th, td {
            border: 1px solid #444;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            background: #efefef;
        }

        .total {
            margin-top: 20px;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Reçu de paiement</h1>

<div class="section">
    <span class="label">Prenom &amp; Nom :</span>
    <span th:text="${data.prenom + ' ' + data.prenom}">Nom</span>
</div>

<div class="section">
    <span class="label">Matricule :</span>
    <span th:text="${data.matricule}">Matricule</span>
</div>

<div class="section">
    <span class="label">Classe :</span>
    <span th:text="${data.classe}">Classe</span>
</div>

<div class="section">
    <span class="label">Date de paiement :</span>
    <span th:text="${data.datePaiement}">2026-04-08</span>
</div>

<table>
    <thead>
    <tr>
        <th>Libellé</th>
        <th>Montant</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="ligne : ${data.moisPayes}">
        <!-- LIBELLE -->
        <td th:text="
        ${ligne.typePaiement.name() == 'MENSUALITE'
            ? (ligne.statut.name() == 'PAYE'
                ? 'Mensualité du mois : ' + data.getMoisLibelle(ligne.moisAcademique.mois, ligne.moisAcademique.annee)
                : 'Avance sur le mois : ' + data.getMoisLibelle(ligne.moisAcademique.mois, ligne.moisAcademique.annee))
            : ligne.typePaiement.name() == 'FRAIS_INSCRIPTION'?'Paiement frais inscription'
                :'Paiement autres frais'
        }">
        </td>
        <!-- MONTANT -->
        <td th:text="${ligne.montant.valeur}"></td>
    </tr>
    </tbody>
</table>

<div class="total">
    Total payé : <span th:text="${data.totalPaye}"></span>
</div>

</body>
</html>
